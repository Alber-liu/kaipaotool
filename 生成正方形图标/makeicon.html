<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>一键生成正方形图标 256x256</title>
</head>
<body>
<input type="file" id="imgFile" accept="image/png">
<script>
document.getElementById('imgFile').onchange = function(e){
  let file = e.target.files[0];
  if(!file)return;
  let img = new Image();
  img.onload = function(){
    // 目标正方形尺寸 256*256
    const size = 256;
    let canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    let ctx = canvas.getContext('2d');
    
    // 透明背景
    ctx.clearRect(0,0,size,size);

    // 等比例计算居中，不变形
    let scale = Math.min(size / img.width, size / img.height);
    let w = img.width * scale;
    let h = img.height * scale;
    let x = (size - w) / 2;
    let y = (size - h) / 2;

    ctx.drawImage(img, x, y, w, h);

    // 下载新的 256x256 正方形logo
    canvas.toBlob(blob=>{
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = "logo_256.png";
      a.click();
    },"image/png");
  }
  img.src = URL.createObjectURL(file);
}
</script>
</body>
</html>
